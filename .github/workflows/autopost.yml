name: Affiliate Autopilot - 10x/day Telegram Posts

on:
  schedule:
    # IST times (UTC = IST - 5:30)
    - cron: '30 1 * * *'   # 07:00 IST
    - cron: '0 3 * * *'    # 08:30 IST
    - cron: '30 4 * * *'   # 10:00 IST
    - cron: '0 6 * * *'    # 11:30 IST
    - cron: '30 7 * * *'   # 13:00 IST
    - cron: '0 9 * * *'    # 14:30 IST
    - cron: '30 10 * * *'  # 16:00 IST
    - cron: '0 12 * * *'   # 17:30 IST
    - cron: '30 13 * * *'  # 19:00 IST
    - cron: '30 15 * * *'  # 21:00 IST

  workflow_dispatch:  # Manual trigger bhi possible

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai requests beautifulsoup4

      - name: Run auto-post
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python post_once.py
